name: crystalserver-myaac

services:
  myaac:
    build:
      context: ./docker
      dockerfile: Dockerfile.myaac.portainer
      args:
        MYAAC_VERSION: "${MYAAC_VERSION:-}"
        MYAAC_REF: "${MYAAC_REF:-develop}"
    restart: unless-stopped
    environment:
      MYAAC_INSTALL_ALLOWED_IPS: "${MYAAC_INSTALL_ALLOWED_IPS:-}"
    ports:
      - "${MYAAC_HTTP_PORT:-80}:80"
    volumes:
      - myaac-data:/myaac-data
      - server-data:/var/www/server:ro
    networks:
      - shared

volumes:
  myaac-data:
    name: "${MYAAC_VOLUME_NAME:-crystalserver-myaac}"
  server-data:
    name: "${SERVER_DATA_VOLUME_NAME:-crystalserver-server-data}"

networks:
  shared:
    name: "${SHARED_NETWORK_NAME:-crystalserver-network}"
