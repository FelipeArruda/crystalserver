name: Docker Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/docker.yml"
      - "docker/**"
      - "src/**"
      - "config.lua.dist"
      - "data/XML/events.xml"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "vcpkg.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker.yml"
      - "docker/**"
      - "src/**"
      - "config.lua.dist"
      - "data/XML/events.xml"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "vcpkg.json"

jobs:
  build-otserver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build otserver image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.x86
          push: false
          tags: crystalserver/otserver:ci-${{ github.sha }}
          cache-from: type=gha,scope=otserver
          cache-to: type=gha,scope=otserver,mode=max

  validate-login-dockerfile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate login Dockerfile
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.login
          push: false
          tags: crystalserver/login-validate:ci-${{ github.sha }}
