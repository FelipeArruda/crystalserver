name: Docker Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/docker.yml"
      - "docker/**"
      - "src/**"
      - "config.lua.dist"
      - "data/XML/events.xml"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "vcpkg.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker.yml"
      - "docker/**"
      - "src/**"
      - "config.lua.dist"
      - "data/XML/events.xml"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "vcpkg.json"

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: otserver
            dockerfile: docker/Dockerfile.x86
          - name: login
            dockerfile: docker/Dockerfile.login

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: crystalserver/${{ matrix.name }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
