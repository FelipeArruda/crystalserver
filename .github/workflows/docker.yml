name: Build and Push Docker Images

on:
push:
branches: [ "main" ]

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_TOKEN }}

  - name: Build and push OTServer image
    uses: docker/build-push-action@v5
    with:
      context: .
      file: docker/Dockerfile.x86
      push: true
      tags: |
        felipearruda/crystalserver:latest
        felipearruda/crystalserver:${{ github.sha }}

  - name: Build and push Login image
    uses: docker/build-push-action@v5
    with:
      context: .
      file: docker/Dockerfile.login
      push: true
      tags: |
        felipearruda/crystalserver-login:latest
        felipearruda/crystalserver-login:${{ github.sha }}