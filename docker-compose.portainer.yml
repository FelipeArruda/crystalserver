name: crystalserver

services:
  database:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    volumes:
      - db-volume:/var/lib/mysql
    networks:
      shared:
        aliases:
          - "${OT_DB_HOST:-database}"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      timeout: 5s
      retries: 10

  server-data-init:
    image: busybox:1.36
    restart: "no"
    command: ["sh", "-c", "mkdir -p /data/server && chown -R 999:999 /data/server"]
    volumes:
      - server-data:/data/server
    networks:
      - shared

  otserver:
    image: "${OTSERVER_IMAGE:-felipearruda/crystalserver:latest}"
    pull_policy: always
    restart: unless-stopped
    environment:
      OT_DB_HOST: database
      OT_DB_PORT: 3306
      OT_DB_USER: "${MYSQL_USER}"
      OT_DB_PASSWORD: "${MYSQL_PASSWORD}"
      OT_DB_DATABASE: "${MYSQL_DATABASE}"
      OT_SERVER_IP: "${SERVER_IP:-auto}"
      OT_SERVER_LOGIN_PORT: "${statusProtocolPort:-7171}"
      OT_SERVER_GAME_PORT: "${gameProtocolPort:-7172}"
      OT_SERVER_STATUS_PORT: "${statusProtocolPort:-7171}"
      OT_SERVER_TEST_ACCOUNTS: "${OT_SERVER_TEST_ACCOUNTS:-false}"
      OT_SERVER_DATA: "${OT_SERVER_DATA:-data-global}"
    ports:
      - "${statusProtocolPort:-7171}:7171"
      - "${gameProtocolPort:-7172}:7172"
    volumes:
      - server-data:/data/server
    networks:
      shared:
        aliases:
          - otserver
    depends_on:
      database:
        condition: service_healthy
      server-data-init:
        condition: service_completed_successfully

  myaac:
    build:
      context: ./docker
      dockerfile: Dockerfile.myaac.portainer
      args:
        MYAAC_VERSION: "${MYAAC_VERSION:-}"
        MYAAC_REF: "${MYAAC_REF:-develop}"
    restart: unless-stopped
    environment:
      MYAAC_INSTALL_ALLOWED_IPS: "${MYAAC_INSTALL_ALLOWED_IPS:-}"
      MYAAC_STATUS_HOST: "${MYAAC_STATUS_HOST:-otserver}"
      MYAAC_STATUS_PORT: "${MYAAC_STATUS_PORT:-7171}"
    ports:
      - "${MYAAC_HTTP_PORT:-80}:80"
    volumes:
      - myaac-data:/myaac-data
      - server-data:/var/www/server:ro
    networks:
      - shared
    depends_on:
      database:
        condition: service_healthy
      otserver:
        condition: service_started
      server-data-init:
        condition: service_completed_successfully

volumes:
  db-volume:
    name: "${DB_VOLUME_NAME:-crystalserver-db}"
  myaac-data:
    name: "${MYAAC_VOLUME_NAME:-crystalserver-myaac}"
  server-data:
    name: "${SERVER_DATA_VOLUME_NAME:-crystalserver-server-data}"

networks:
  shared:
    name: "${SHARED_NETWORK_NAME:-crystalserver-network}"
