name: crystalserver

services:
  database:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    volumes:
      - db-volume:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      timeout: 5s
      retries: 10

  server-data-init:
    image: busybox:1.36
    restart: "no"
    command: ["sh", "-c", "mkdir -p /data/server && chown -R 999:999 /data/server"]
    volumes:
      - server-data:/data/server

  otserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.x86
    image: crystalserver-otserver:local
    restart: unless-stopped
    environment:
      OT_DB_HOST: database
      OT_DB_PORT: 3306
      OT_DB_USER: "${MYSQL_USER}"
      OT_DB_PASSWORD: "${MYSQL_PASSWORD}"
      OT_DB_DATABASE: "${MYSQL_DATABASE}"
      OT_SERVER_IP: "${SERVER_IP:-auto}"
      OT_SERVER_LOGIN_PORT: "${statusProtocolPort:-7171}"
      OT_SERVER_GAME_PORT: "${gameProtocolPort:-7172}"
      OT_SERVER_STATUS_PORT: "${statusProtocolPort:-7171}"
      OT_SERVER_TEST_ACCOUNTS: "${OT_SERVER_TEST_ACCOUNTS:-false}"
      OT_SERVER_DATA: "${OT_SERVER_DATA:-data-global}"
    ports:
      - "${statusProtocolPort:-7171}:7171"
      - "${gameProtocolPort:-7172}:7172"
    volumes:
      - server-data:/data/server
    depends_on:
      database:
        condition: service_healthy
      server-data-init:
        condition: service_completed_successfully

  myaac:
    build:
      context: ./docker
      dockerfile: Dockerfile.myaac.portainer
      args:
        MYAAC_VERSION: "${MYAAC_VERSION:-}"
        MYAAC_REF: "${MYAAC_REF:-develop}"
    restart: unless-stopped
    environment:
      MYAAC_INSTALL_ALLOWED_IPS: "${MYAAC_INSTALL_ALLOWED_IPS:-}"
    ports:
      - "${MYAAC_HTTP_PORT:-80}:80"
    volumes:
      - myaac-data:/myaac-data
      - server-data:/var/www/server:ro
    depends_on:
      database:
        condition: service_healthy
      server-data-init:
        condition: service_completed_successfully

volumes:
  db-volume:
  myaac-data:
  server-data:
