name: crystalserver

services:
  database:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    volumes:
      - db-volume:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      timeout: 5s
      retries: 10

  otserver:
    image: felipearruda/crystalserver:latest
    restart: unless-stopped
    environment:
      OT_DB_HOST: database
      OT_DB_PORT: 3306
      OT_DB_USER: "${MYSQL_USER}"
      OT_DB_PASSWORD: "${MYSQL_PASSWORD}"
      OT_DB_DATABASE: "${MYSQL_DATABASE}"
      OT_SERVER_IP: "${SERVER_IP:-auto}"
      OT_SERVER_LOGIN_PORT: "${statusProtocolPort:-7171}"
      OT_SERVER_GAME_PORT: "${gameProtocolPort:-7172}"
      OT_SERVER_STATUS_PORT: "${statusProtocolPort:-7171}"
      OT_SERVER_TEST_ACCOUNTS: "${OT_SERVER_TEST_ACCOUNTS:-false}"
      OT_SERVER_DATA: "${OT_SERVER_DATA:-data-global}"
    ports:
      - "${statusProtocolPort:-7171}:7171"
      - "${gameProtocolPort:-7172}:7172"
    depends_on:
      database:
        condition: service_healthy
      login:
        condition: service_started

  login:
    image: felipearruda/crystalserver-login:latest
    restart: unless-stopped
    environment:
      MYSQL_HOST: database
      MYSQL_PORT: 3306
      MYSQL_DBNAME: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASS: "${MYSQL_PASSWORD}"
      SERVER_NAME: "${SERVER_NAME:-crystalserver}"
      SERVER_IP: "${SERVER_IP:-127.0.0.1}"
      SERVER_PORT: "${gameProtocolPort:-7172}"
      SERVER_LOCATION: "${SERVER_LOCATION:-BRA}"
      RATE_LIMITER_RATE: "${RATE_LIMITER_RATE:-2}"
      RATE_LIMITER_BURST: "${RATE_LIMITER_BURST:-5}"
    volumes:
      - "../config.lua.dist:/config.lua:ro"
    ports:
      - "${LOGIN_HTTP_PORT:-80}:80"
      - "${LOGIN_GRPC_PORT:-9090}:9090"
    depends_on:
      database:
        condition: service_healthy

volumes:
  db-volume:
